<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Leituras</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="top-bar">
            <h1>Biblioteca Pessoal</h1>
            <div class="user-actions">
                <i class="fa-solid fa-magnifying-glass"></i>
                <div class="avatar"></div>
            </div>
        </div>
        <nav class="categories">
            <button class="active">Tudo</button>
            <button>Livros</button>
            <button>Docs</button>
            <button>Artigos</button>
        </nav>
    </header>

    <main class="content" id="reading-list">
        </main>

    <nav class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i><span>Início</span></div>
        <div class="nav-item"><i class="fa-solid fa-compass"></i><span>Explorar</span></div>
        <div class="nav-item add-btn"><i class="fa-solid fa-plus"></i></div>
        <div class="nav-item"><i class="fa-solid fa-chart-simple"></i><span>Relatórios</span></div>
        <div class="nav-item"><i class="fa-solid fa-user"></i><span>Perfil</span></div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
